<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>kenitoa public workshop animated header</title>
  <defs>
    <linearGradient id="panelGlow" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121826"/>
      <stop offset="0.33" stop-color="#0B3B5A"/>
      <stop offset="0.66" stop-color="#2E1065"/>
      <stop offset="1" stop-color="#064E3B"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 600 180" to="360 600 180" dur="18s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.35" stop-color="#A78BFA"/>
      <stop offset="0.7" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.2 0 1 0 0 0.8 0 0 1 0 1 0 0 0 0.8 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#E5E7EB" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="28" fill="#070B13"/>
  <rect x="14" y="14" width="1172" height="332" rx="22" fill="url(#panelGlow)" opacity="0.68"/>
  <rect x="14" y="14" width="1172" height="332" rx="22" fill="url(#grid)"/>

  <g opacity="0.45">
    <path d="M0 74H1200" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <path d="M0 146H1200" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <path d="M0 218H1200" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <path d="M0 290H1200" stroke="#FFFFFF" stroke-opacity="0.08"/>
  </g>

  <rect x="86" y="58" width="360" height="244" rx="20" fill="#050A14" fill-opacity="0.74" stroke="#93C5FD" stroke-opacity="0.42"/>
  <text x="112" y="98" fill="#93C5FD" font-family="Consolas, monospace" font-size="18">PUBLIC_WORKSHOP://KENITOA</text>
  <text x="112" y="142" fill="#F8FAFC" font-family="Consolas, monospace" font-size="38" font-weight="700">LOCAL AI</text>
  <text x="112" y="186" fill="#F8FAFC" font-family="Consolas, monospace" font-size="38" font-weight="700">GAME LAB</text>
  <text x="112" y="230" fill="#F8FAFC" font-family="Consolas, monospace" font-size="38" font-weight="700">ARCHIVE WEB</text>
  <text x="112" y="270" fill="#A7F3D0" font-family="Consolas, monospace" font-size="18">status: 6 work repos online</text>

  <g transform="translate(700 180)" filter="url(#softGlow)">
    <circle r="96" stroke="#38BDF8" stroke-width="2" stroke-opacity="0.82" stroke-dasharray="14 10">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle r="58" stroke="#34D399" stroke-width="2" stroke-opacity="0.72" stroke-dasharray="8 12">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle r="18" fill="#F8FAFC"/>
    <circle r="10" fill="#2F6FED">
      <animate attributeName="r" values="8;15;8" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <g>
      <circle cx="0" cy="-96" r="10" fill="#38BDF8"/>
      <circle cx="83" cy="48" r="10" fill="#A78BFA"/>
      <circle cx="-83" cy="48" r="10" fill="#34D399"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
    </g>
  </g>

  <g font-family="Consolas, monospace" font-size="18">
    <rect x="862" y="74" width="214" height="42" rx="12" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.48"/>
    <text x="884" y="101" fill="#BAE6FD">local-ai</text>
    <rect x="902" y="132" width="214" height="42" rx="12" fill="#0F172A" stroke="#A78BFA" stroke-opacity="0.48"/>
    <text x="924" y="159" fill="#DDD6FE">MuWorld</text>
    <rect x="850" y="190" width="214" height="42" rx="12" fill="#0F172A" stroke="#34D399" stroke-opacity="0.48"/>
    <text x="872" y="217" fill="#BBF7D0">War-Achive</text>
    <rect x="906" y="248" width="214" height="42" rx="12" fill="#0F172A" stroke="#F59E0B" stroke-opacity="0.48"/>
    <text x="928" y="275" fill="#FDE68A">Unity + Python</text>
  </g>

  <path d="M446 180C520 90 603 88 700 180C794 270 836 204 862 95" stroke="url(#rail)" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 16">
    <animate attributeName="stroke-dashoffset" from="0" to="-280" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M446 224C536 286 602 276 700 180C789 94 838 154 902 153" stroke="url(#rail)" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 16">
    <animate attributeName="stroke-dashoffset" from="0" to="-280" dur="4.6s" repeatCount="indefinite"/>
  </path>

  <rect x="48" y="330" width="1104" height="4" rx="2" fill="url(#rail)">
    <animate attributeName="opacity" values="0.32;1;0.32" dur="2.4s" repeatCount="indefinite"/>
  </rect>
</svg>
